[env]
_.path   = ['{{config_root}}/node_modules/.bin']
PROJECT  = "claudevoyant"
VERSION  = "{{exec(command='cat version.txt 2>/dev/null | tr -d \"[:space:]\" || echo 0.0.0')}}"

[tools]
node       = "lts"
pnpm       = "latest"
bats       = "latest"
shellcheck = "latest"
shfmt      = "latest"
gh         = "latest"
glab       = "latest"
"npm:skills-ref" = "0.1.5"

# ==============================================================================
# UTILS
# ==============================================================================

[tasks.sync-utils]
description = "Sync shared utils into all plugins"
run         = ".mise-tasks/sync-utils"

# ==============================================================================
# TESTING
# ==============================================================================

[tasks.test]
description = "Run tests"
run         = ".mise-tasks/test"

# ==============================================================================
# DOCS
# ==============================================================================

[tasks.docs]
description = "Start local docs dev server"
run         = "npm run docs:dev"

[tasks."docs:build"]
description = "Build docs site"
run         = "npm run docs:build"

[tasks."docs:preview"]
description = "Preview built docs"
run         = "npm run docs:preview"

[tasks.favicons]
description = "Generate favicons from SVGs in docs/public/"
run         = ".mise-tasks/favicons"

# ==============================================================================
# CI/CD
# ==============================================================================

[tasks.install]
description = "Install all workspace dependencies"
run         = "pnpm install"

[tasks.version]
description = "Print current version"
run         = "cat version.txt"

[tasks.upversion]
description = "Run semantic-release to version and update changelog"
run         = ".mise-tasks/upversion"

[tasks.publish]
description = "Publish (placeholder — via git tag and GitHub release)"
run = """
echo "Plugin published via git tag and GitHub release"
echo "Users install via: npx skills add cloudvoyant/codevoyant"
"""

# ==============================================================================
# pnpm monorepo tasks (packages/)
# ==============================================================================

[tasks."build:agent-kit"]
description = "Build @codevoyant/agent-kit"
depends     = ["install"]
run         = "pnpm --filter @codevoyant/agent-kit run build"

[tasks."build:skill-converter"]
description = "Build @codevoyant/claude-skill-converter"
depends     = ["install"]
run         = "pnpm --filter @codevoyant/claude-skill-converter run build"

[tasks."skills:validate"]
description = "Validate all SKILL.md files against the Agent Skills base spec"
run = """
#!/usr/bin/env bash
set -euo pipefail
failed=0
count=0
while IFS= read -r f; do
  count=$((count + 1))
  output=$(skills-ref read-properties "$f" 2>&1) || { echo "FAIL: $f"; echo "  $output"; failed=$((failed + 1)); continue; }
  missing=""
  for field in name description license compatibility; do
    if ! echo "$output" | grep -q "\"$field\""; then
      missing="$missing $field"
    fi
  done
  if [ -n "$missing" ]; then
    echo "FAIL: $f — missing required field(s):$missing"
    failed=$((failed + 1))
  else
    echo "PASS: $f"
  fi
done < <(find ./skills -name 'SKILL.md' | sort)
echo ""
echo "$count skills checked, $failed failed."
if [ "$failed" -gt 0 ]; then exit 1; fi
echo "All skills passed validation."
"""

[tasks."skills:install"]
description = "Install/update all skills from remote (cloudvoyant/codevoyant)"
run = "npx skills add cloudvoyant/codevoyant -g --all -y"

[tasks."skills:build"]
description = "Convert plugins into flat skill bundles for OpenCode and Copilot"
depends     = ["build:skill-converter"]
run         = "node packages/claude-skill-converter/dist/index.js"

[tasks."test:agent-kit"]
description = "Run @codevoyant/agent-kit tests"
depends     = ["install"]
run         = "pnpm --filter @codevoyant/agent-kit run test"

[tasks."lint:agent-kit"]
description = "Lint @codevoyant/agent-kit"
depends     = ["install"]
run         = "pnpm --filter @codevoyant/agent-kit run lint"

[tasks."format-check:agent-kit"]
description = "Check formatting of packages/"
depends     = ["install"]
run         = "pnpm run format:check"

[tasks."publish:agent-kit"]
description = "Publish @codevoyant/agent-kit to npm"
depends     = ["build:agent-kit"]
run         = "pnpm --filter @codevoyant/agent-kit publish --access public --no-git-checks"

[tasks."test:e2e"]
description = "Run e2e installation and structure tests"
depends     = ["install"]
run         = "pnpm --filter @codevoyant/e2e run test"

[tasks."publish-rc:agent-kit"]
description = "Publish RC @codevoyant/agent-kit to npm with 'next' tag"
depends     = ["build:agent-kit"]
run         = "pnpm --filter @codevoyant/agent-kit publish --access public --no-git-checks --tag next"
