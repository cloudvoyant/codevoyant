[env]
_.path   = ['{{config_root}}/node_modules/.bin']
PROJECT  = "claudevoyant"
VERSION  = "{{exec(command='cat version.txt 2>/dev/null | tr -d \"[:space:]\" || echo 0.0.0')}}"

[tools]
node       = "lts"
pnpm       = "latest"
bats       = "latest"
shellcheck = "latest"
shfmt      = "latest"
gh         = "latest"
glab       = "latest"

# ==============================================================================
# UTILS
# ==============================================================================

[tasks.sync-utils]
description = "Sync shared utils into all plugins"
run         = ".mise-tasks/sync-utils"

# ==============================================================================
# TESTING
# ==============================================================================

[tasks.test]
description = "Run tests"
run         = ".mise-tasks/test"

# ==============================================================================
# DOCS
# ==============================================================================

[tasks.docs]
description = "Start local docs dev server"
run         = "npm run docs:dev"

[tasks."docs:build"]
description = "Build docs site"
run         = "npm run docs:build"

[tasks."docs:preview"]
description = "Preview built docs"
run         = "npm run docs:preview"

[tasks.favicons]
description = "Generate favicons from SVGs in docs/public/"
run         = ".mise-tasks/favicons"

# ==============================================================================
# CI/CD
# ==============================================================================

[tasks.install]
description = "Install all workspace dependencies"
run         = "pnpm install"

[tasks.version]
description = "Print current version"
run         = "cat version.txt"

[tasks.upversion]
description = "Run semantic-release to version and update changelog"
run         = ".mise-tasks/upversion"

[tasks.publish]
description = "Publish (placeholder — via git tag and GitHub release)"
run = """
echo "Plugin published via git tag and GitHub release"
echo "Users install via: /plugin marketplace add cloudvoyant/claudevoyant"
"""

# ==============================================================================
# pnpm monorepo tasks (packages/)
# ==============================================================================

[tasks."build:agent-kit"]
description = "Build @codevoyant/agent-kit"
depends     = ["install"]
run         = "pnpm --filter @codevoyant/agent-kit run build"

[tasks."test:agent-kit"]
description = "Run @codevoyant/agent-kit tests"
depends     = ["install"]
run         = "pnpm --filter @codevoyant/agent-kit run test"

[tasks."lint:agent-kit"]
description = "Lint @codevoyant/agent-kit"
depends     = ["install"]
run         = "pnpm --filter @codevoyant/agent-kit run lint"

[tasks."format-check:agent-kit"]
description = "Check formatting of packages/"
depends     = ["install"]
run         = "pnpm run format:check"

[tasks."publish:agent-kit"]
description = "Publish @codevoyant/agent-kit to npm"
depends     = ["build:agent-kit"]
run         = "pnpm --filter @codevoyant/agent-kit publish --access public --no-git-checks"

[tasks."test:e2e"]
description = "Run e2e installation and structure tests"
depends     = ["install"]
run         = "pnpm --filter @codevoyant/e2e run test"

[tasks."publish-rc:agent-kit"]
description = "Publish RC @codevoyant/agent-kit to npm with 'next' tag"
depends     = ["build:agent-kit"]
run         = "pnpm --filter @codevoyant/agent-kit publish --access public --no-git-checks --tag next"
