<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <mask id="book-cut">
      <rect width="64" height="64" fill="white"/>
      <!-- book spine line -->
      <rect x="20" y="10" width="2.5" height="44" rx="1" fill="black"/>
      <!-- page lines -->
      <rect x="26" y="18" width="20" height="2.5" rx="1" fill="black"/>
      <rect x="26" y="25" width="16" height="2.5" rx="1" fill="black"/>
      <rect x="26" y="32" width="18" height="2.5" rx="1" fill="black"/>
      <rect x="26" y="39" width="14" height="2.5" rx="1" fill="black"/>
    </mask>
  </defs>
  <!-- book shape: rounded rect body -->
  <rect x="14" y="8" width="36" height="48" rx="4" fill="#5555ff" mask="url(#book-cut)"/>
  <!-- bookmark ribbon -->
  <polygon points="44,8 50,8 50,22 47,18 44,22" fill="#5555ff" opacity="0.7"/>
</svg>
