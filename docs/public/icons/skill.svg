<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Socket bands (drawn first so circle sits on top) -->
  <rect x="21" y="40" width="22" height="6" fill="#ede9ff" stroke="#5555ff" stroke-width="2"/>
  <rect x="22" y="46" width="20" height="5" fill="#ede9ff" stroke="#5555ff" stroke-width="2"/>
  <rect x="23" y="51" width="18" height="5" fill="#ede9ff" stroke="#5555ff" stroke-width="2"/>
  <!-- Socket base (rounded) -->
  <rect x="25" y="56" width="14" height="7" rx="3.5" fill="#ede9ff" stroke="#5555ff" stroke-width="2"/>

  <!-- Bulb glass (covers socket top) -->
  <circle cx="32" cy="24" r="18" fill="#ede9ff" stroke="#5555ff" stroke-width="2.5"/>

  <!-- Rays -->
  <line x1="32" y1="5"  x2="32" y2="1"  stroke="#5555ff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="42" y1="8"  x2="45" y2="4"  stroke="#5555ff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="22" y1="8"  x2="19" y2="4"  stroke="#5555ff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="49" y1="17" x2="53" y2="15" stroke="#5555ff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="15" y1="17" x2="11" y2="15" stroke="#5555ff" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Brain: left lobe (closed — right edge is the center divider) -->
  <path d="M32 13 C28 13 21 16 20 22 C19 26 20 30 24 33 C27 35 30 36 32 36 Z"
        fill="#ede9ff" stroke="#5555ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Brain: right lobe (mirror) -->
  <path d="M32 13 C36 13 43 16 44 22 C45 26 44 30 40 33 C37 35 34 36 32 36 Z"
        fill="#ede9ff" stroke="#5555ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Brain: left outer folds -->
  <path d="M24 15 C21 14 19 18 23 20" stroke="#5555ff" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M19 25 C16 24 16 30 21 29" stroke="#5555ff" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Brain: right outer folds -->
  <path d="M40 15 C43 14 45 18 41 20" stroke="#5555ff" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M45 25 C48 24 48 30 43 29" stroke="#5555ff" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Brain: center divider -->
  <line x1="32" y1="13" x2="32" y2="36" stroke="#5555ff" stroke-width="1.5" stroke-linecap="round"/>
</svg>
