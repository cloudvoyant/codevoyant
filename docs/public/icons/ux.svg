<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Monitor body -->
  <rect x="3" y="3" width="58" height="41" rx="6" fill="#ede9ff" stroke="#5555ff" stroke-width="2.5"/>
  <!-- Bottom bezel divider -->
  <line x1="3" y1="38" x2="61" y2="38" stroke="#5555ff" stroke-width="2"/>
  <!-- Panel divider (vertical) -->
  <line x1="32" y1="3" x2="32" y2="38" stroke="#5555ff" stroke-width="2"/>

  <!-- Left panel: wireframe layout -->
  <!-- Header bar -->
  <rect x="7" y="7" width="21" height="7" rx="2" fill="#ede9ff" stroke="#5555ff" stroke-width="2"/>
  <!-- Two cards -->
  <rect x="7" y="18" width="9" height="9" rx="2" fill="#ede9ff" stroke="#5555ff" stroke-width="2"/>
  <rect x="19" y="18" width="9" height="9" rx="2" fill="#ede9ff" stroke="#5555ff" stroke-width="2"/>

  <!-- Right panel: </> code symbol -->
  <path d="M42 11 L37 15 L42 19" stroke="#5555ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="48" y1="10" x2="45" y2="20" stroke="#5555ff" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M51 11 L56 15 L51 19" stroke="#5555ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Content lines -->
  <line x1="36" y1="26" x2="58" y2="26" stroke="#5555ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="30" x2="55" y2="30" stroke="#5555ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="34" x2="58" y2="34" stroke="#5555ff" stroke-width="2" stroke-linecap="round"/>

  <!-- Stand neck (trapezoid, wider at base) -->
  <path d="M27 44 L23 54 L41 54 L37 44 Z" fill="#ede9ff" stroke="#5555ff" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Stand base -->
  <rect x="19" y="54" width="26" height="5" rx="3" fill="#ede9ff" stroke="#5555ff" stroke-width="2.5"/>
</svg>
