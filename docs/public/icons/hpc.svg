<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- CPU die -->
  <rect x="16" y="16" width="32" height="32" rx="3" stroke="#5555ff" stroke-width="2.5"/>
  <!-- Inner grid lines -->
  <line x1="16" y1="32" x2="48" y2="32" stroke="#5555ff" stroke-width="1.5"/>
  <line x1="32" y1="16" x2="32" y2="48" stroke="#5555ff" stroke-width="1.5"/>
  <!-- Core squares -->
  <rect x="21" y="21" width="7" height="7" rx="1" fill="#5555ff"/>
  <rect x="36" y="21" width="7" height="7" rx="1" fill="#5555ff"/>
  <rect x="21" y="36" width="7" height="7" rx="1" fill="#5555ff"/>
  <rect x="36" y="36" width="7" height="7" rx="1" fill="#5555ff"/>
  <!-- Top pins -->
  <line x1="24" y1="8" x2="24" y2="16" stroke="#5555ff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="8" x2="32" y2="16" stroke="#5555ff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="8" x2="40" y2="16" stroke="#5555ff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bottom pins -->
  <line x1="24" y1="48" x2="24" y2="56" stroke="#5555ff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="48" x2="32" y2="56" stroke="#5555ff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="48" x2="40" y2="56" stroke="#5555ff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left pins -->
  <line x1="8" y1="24" x2="16" y2="24" stroke="#5555ff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="8" y1="32" x2="16" y2="32" stroke="#5555ff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="8" y1="40" x2="16" y2="40" stroke="#5555ff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right pins -->
  <line x1="48" y1="24" x2="56" y2="24" stroke="#5555ff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="48" y1="32" x2="56" y2="32" stroke="#5555ff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="48" y1="40" x2="56" y2="40" stroke="#5555ff" stroke-width="2.5" stroke-linecap="round"/>
</svg>
