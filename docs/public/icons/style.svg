<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Full diamond outline -->
  <path d="M14 11 L50 11 L60 28 L32 58 L4 28 Z" fill="#ede9ff" stroke="#5555ff" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Girdle line -->
  <line x1="4" y1="28" x2="60" y2="28" stroke="#5555ff" stroke-width="2.5"/>
  <!-- Crown facet lines — two X crossing pairs -->
  <line x1="14" y1="11" x2="22" y2="28" stroke="#5555ff" stroke-width="2"/>
  <line x1="26" y1="11" x2="4"  y2="28" stroke="#5555ff" stroke-width="2"/>
  <line x1="50" y1="11" x2="42" y2="28" stroke="#5555ff" stroke-width="2"/>
  <line x1="38" y1="11" x2="60" y2="28" stroke="#5555ff" stroke-width="2"/>
  <!-- Pavilion inner facet lines -->
  <line x1="22" y1="28" x2="32" y2="58" stroke="#5555ff" stroke-width="2"/>
  <line x1="42" y1="28" x2="32" y2="58" stroke="#5555ff" stroke-width="2"/>
  <!-- Center vertical with dot break -->
  <line x1="32" y1="28" x2="32" y2="41" stroke="#5555ff" stroke-width="2" stroke-linecap="round"/>
  <circle cx="32" cy="45" r="2" fill="#5555ff"/>
  <line x1="32" y1="50" x2="32" y2="57" stroke="#5555ff" stroke-width="2" stroke-linecap="round"/>
</svg>
