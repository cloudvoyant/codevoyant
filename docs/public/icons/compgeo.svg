<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#5555ff" stroke-width="2" stroke-linejoin="round">
  <!-- Wireframe octahedron — computational geometry mesh theme -->
  <!-- Top vertex -->
  <line x1="32" y1="6" x2="12" y2="32"/>
  <line x1="32" y1="6" x2="52" y2="32"/>
  <line x1="32" y1="6" x2="32" y2="26"/>
  <!-- Bottom vertex -->
  <line x1="32" y1="58" x2="12" y2="32"/>
  <line x1="32" y1="58" x2="52" y2="32"/>
  <line x1="32" y1="58" x2="32" y2="26"/>
  <!-- Equatorial edges -->
  <line x1="12" y1="32" x2="32" y2="26"/>
  <line x1="32" y1="26" x2="52" y2="32"/>
  <line x1="12" y1="32" x2="52" y2="32"/>
  <!-- Vertices -->
  <circle cx="32" cy="6" r="2.5" fill="#5555ff" stroke="none"/>
  <circle cx="32" cy="58" r="2.5" fill="#5555ff" stroke="none"/>
  <circle cx="12" cy="32" r="2.5" fill="#5555ff" stroke="none"/>
  <circle cx="52" cy="32" r="2.5" fill="#5555ff" stroke="none"/>
  <circle cx="32" cy="26" r="2.5" fill="#5555ff" stroke="none"/>
</svg>
