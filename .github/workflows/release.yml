name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]') && github.event.before != '0000000000000000000000000000000000000000'"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v2
      - run: mise run install
      - run: mise run test:agent-kit
      - name: Version + changelog
        id: upversion
        run: mise run upversion -- --ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          CI: true
      - name: Build
        if: steps.upversion.outputs.new_release_published == 'true'
        run: mise run build:agent-kit
      - name: Publish @codevoyant/agent-kit to npm
        if: steps.upversion.outputs.new_release_published == 'true'
        run: mise run publish:agent-kit
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: GitHub Release
        if: steps.upversion.outputs.new_release_published == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.upversion.outputs.new_release_version }}
          generate_release_notes: true
          files: |
            CHANGELOG.md
            plugins/dev/.claude-plugin/plugin.json
            plugins/em/.claude-plugin/plugin.json
            plugins/memory/.claude-plugin/plugin.json
            plugins/pm/.claude-plugin/plugin.json
            plugins/spec/.claude-plugin/plugin.json
            plugins/ux/.claude-plugin/plugin.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
